name: Karate POS Tests with Allure Report

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'posAllTests'
        type: choice
        options:
          - posAllTests
          - testPosCashTransaction
          - testPosCardPayment
          - testPosLoyalty

permissions:
  contents: write
  checks: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  karate-tests:
    name: Run Karate POS Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Start infrastructure with docker-compose
        run: |
          docker compose -f docker-compose-ci.yml up -d
          echo "Waiting 90s for all services to start..."
          sleep 90

      - name: Verify all services
        run: |
          echo "=== Docker containers ==="
          docker ps
          echo "=== Kafka ==="
          nc -z localhost 9092 && echo "KAFKA READY" || echo "KAFKA NOT READY"
          echo "=== Schema Registry ==="
          curl -s http://localhost:8081/subjects && echo " SR READY" || echo " SR NOT READY"
          echo "=== PostgreSQL ==="
          pg_isready -h localhost -p 5432 -U qauser && echo "PG READY" || echo "PG NOT READY"
          echo "=== MongoDB ==="
          nc -z localhost 27017 && echo "MONGO READY" || echo "MONGO NOT READY"
          echo "=== RabbitMQ ==="
          nc -z localhost 5672 && echo "RABBITMQ READY" || echo "RABBITMQ NOT READY"

      - name: Compile project
        run: mvn compile -q

      - name: Start Spring Boot app
        run: |
          nohup mvn spring-boot:run > app.log 2>&1 &
          echo "Waiting for Spring Boot (max 150s)..."
          for i in {1..30}; do
            sleep 5
            if curl -s http://localhost:8085/orders > /dev/null 2>&1; then
              echo "Spring Boot STARTED after $((i*5))s"
              break
            fi
            if [ $((i % 4)) -eq 0 ]; then
              echo "Still waiting $((i*5))s..."
              tail -3 app.log
            fi
            if [ $i -eq 30 ]; then
              echo "TIMEOUT - full log:"
              cat app.log
              exit 1
            fi
          done

      - name: Show Spring Boot logs
        run: cat app.log

      - name: Warmup - register Avro schemas
        run: |
          echo "Warmup calls..."
          for attempt in 1 2 3 4 5; do
            R=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:8085/pos/transactions \
              -H "Content-Type: application/json" \
              -d "{\"transactionId\":\"WARM-00$attempt\",\"storeId\":\"STORE-001\",\"registerId\":\"REG-001\",\"totalAmount\":10.00,\"paymentMethod\":\"CASH\",\"cashierId\":\"C001\"}")
            echo "Attempt $attempt: HTTP $R"
            if [ "$R" = "201" ]; then
              echo "Schema registered successfully!"
              break
            fi
            sleep 5
          done
          echo "=== Registered schemas ==="
          curl -s http://localhost:8081/subjects || true

      - name: Run POS Cash Transaction tests
        run: |
          mvn test \
            -Dtest=KarateRunner#testPosCashTransaction \
            -Dkarate.env=local \
            -DfailIfNoTests=false || true

      - name: Run POS Card Payment tests
        run: |
          mvn test \
            -Dtest=KarateRunner#testPosCardPayment \
            -Dkarate.env=local \
            -DfailIfNoTests=false || true

      - name: Run POS Loyalty tests
        run: |
          mvn test \
            -Dtest=KarateRunner#testPosLoyalty \
            -Dkarate.env=local \
            -DfailIfNoTests=false || true

      - name: List reports
        if: always()
        run: |
          echo "=== surefire-reports ==="
          ls -la target/surefire-reports/ || echo "No surefire reports"
          echo "=== karate-reports ==="
          ls -la target/karate-reports/ || echo "No karate reports"
          echo "=== allure-results ==="
          ls -la target/allure-results/ || echo "No allure results"

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report -DfailIfNoTests=false || true

      - name: Deploy Karate Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/karate-reports
          destination_dir: karate-report

      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ github.run_number }}
          path: target/site/allure-maven-plugin/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Karate HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-report-${{ github.run_number }}
          path: target/karate-reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Surefire Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-${{ github.run_number }}
          path: target/surefire-reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Spring Boot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-logs-${{ github.run_number }}
          path: app.log
          if-no-files-found: warn
          retention-days: 7

      - name: Publish JUnit Test Summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Karate Test Results
          path: target/surefire-reports/**/*.xml
          reporter: java-junit
          fail-on-error: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stop infrastructure
        if: always()
        run: docker compose -f docker-compose-ci.yml down -v || true